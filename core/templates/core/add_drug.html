{% extends 'core/base.html' %}
{% block title %}Add Drug - Pharmacy{% endblock %}
{% block page_title %}New Product{% endblock %}
{% block breadcrumb %}Catalog / Add Drug{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="custom-card">
            <h6 class="fw-bold mb-4">Product Details</h6>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">PRODUCT NAME</label>
                    <input type="text" class="form-control bg-light border-0 py-3 rounded-4" name="drug_name" placeholder="e.g. Paracetamol 500mg" required>
                </div>
                <div class="mb-5">
                    <label class="form-label text-muted small fw-bold">UNIT TYPE</label>
                    <select class="form-select bg-light border-0 py-3 rounded-4" name="unit" required>
                        <option value="" selected disabled>Select type...</option>
                        <option value="Tablet">Tablet</option><option value="Capsule">Capsule</option><option value="Bottle">Bottle</option>
                    </select>
                </div>
                <div class="d-flex gap-3">
                    <a href="{% url 'inventory' %}" class="btn btn-light w-50 py-3 rounded-pill fw-bold text-dark">Cancel</a>
                    <button type="submit" class="btn btn-dark w-50 py-3 rounded-pill fw-bold">Save Product</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
