<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedStock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; border-radius: 1.5rem; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; max-width: 900px; width: 100%; }
        .bg-pastel { background: linear-gradient(135deg, #a8e0d4, #7ecfc0); color: #164f45; display: flex; flex-direction: column; justify-content: center; padding: 4rem; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center px-4">
        <div class="login-card row g-0">
            <div class="col-md-5 bg-pastel text-center d-none d-md-flex">
                <i class="fa-solid fa-staff-snake mb-3" style="font-size: 4rem;"></i>
                <h2 class="fw-bold mb-3">MedStock</h2>
                <p class="opacity-75 small">Intelligent inventory, POS, and expiry tracking for modern pharmacies.</p>
            </div>
            <div class="col-md-7 p-5 d-flex flex-column justify-content-center">
                <h4 class="fw-bold mb-1">Welcome Back</h4>
                <p class="text-muted small mb-4">Please enter your credentials to access the system.</p>
                
                {% if messages %}
                    {% for msg in messages %}<div class="alert alert-danger small rounded-4 border-0 bg-danger bg-opacity-10 text-danger fw-bold">{{ msg }}</div>{% endfor %}
                {% endif %}
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">USERNAME</label>
                        <input type="text" name="username" class="form-control bg-light border-0 py-3 rounded-4 px-4" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">PASSWORD</label>
                        <input type="password" name="password" class="form-control bg-light border-0 py-3 rounded-4 px-4" required>
                    </div>
                    <button type="submit" class="btn w-100 py-3 rounded-pill fw-bold text-white shadow-sm mt-2" style="background-color: #164f45;">Sign In</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
