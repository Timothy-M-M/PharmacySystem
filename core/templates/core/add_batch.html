<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Batch - Pharmacy System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">Pharmacy System</a>
           <div class="navbar-nav me-auto">
                <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
                <a class="nav-link active" href="{% url 'inventory' %}">Inventory</a>
                <a class="nav-link" href="{% url 'pos' %}">POS Terminal</a>
                <a class="nav-link" href="{% url 'reports' %}">Reports</a>
            </div>
            <div class="navbar-nav align-items-center">
                <span class="navbar-text me-3 text-white">User: {{ request.user.username }}</span>
                <a class="btn btn-danger btn-sm" href="{% url 'logout' %}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Register New Drug Batch</h4>
                    </div>
                    <div class="card-body">
                        
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %}">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}

                        <form method="POST" action="">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label">Select Drug</label>
                                <select class="form-select" name="drug_id" required>
                                    <option value="" selected disabled>Choose medication...</option>
                                    {% for drug in drugs %}
                                        <option value="{{ drug.id }}">{{ drug.drug_name }} ({{ drug.unit }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Batch Number</label>
                                    <input type="text" class="form-control" name="batch_number" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Supplier Name</label>
                                    <input type="text" class="form-control" name="supplier_name" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Manufacturing Date</label>
                                    <input type="date" class="form-control" name="mfg_date" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-danger fw-bold">Expiry Date</label>
                                    <input type="date" class="form-control" name="expiry_date" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Quantity</label>
                                    <input type="number" class="form-control" name="quantity" min="1" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Unit Price (KES)</label>
                                    <input type="number" step="0.01" class="form-control" name="unit_price" min="0.01" required>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mt-3">Register Batch</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
