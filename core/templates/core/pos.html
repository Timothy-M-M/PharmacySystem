<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point of Sale - Pharmacy System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">Pharmacy System</a>
           <div class="navbar-nav me-auto">
                <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
                <a class="nav-link" href="{% url 'inventory' %}">Inventory</a>
                <a class="nav-link active" href="{% url 'pos' %}">POS Terminal</a>
                <a class="nav-link" href="{% url 'reports' %}">Reports</a>
            </div>
            <div class="navbar-nav align-items-center">
                <span class="navbar-text me-3 text-white">User: {{ request.user.username }}</span>
                <a class="btn btn-danger btn-sm" href="{% url 'logout' %}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="mb-4">Point of Sale (FIFO Auto-Selection)</h2>
        
        <div class="row">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">New Sale</h5>
                    </div>
                    <div class="card-body">
                        <form method="POST" action="">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="drug_select" class="form-label">Select Drug</label>
                                <select class="form-select" id="drug_select" name="drug_id" required>
                                    <option value="" selected disabled>Choose a medication...</option>
                                    {% for drug in drugs %}
                                        <option value="{{ drug.id }}">{{ drug.drug_name }} ({{ drug.unit }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="quantity" class="form-label">Quantity to Sell</label>
                                <input type="number" class="form-control" id="quantity" name="quantity" min="1" required>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Process Sale</button>
                        </form>
                    </div>
                </div>
            </div>
            
            <div class="col-md-6">
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} shadow mt-3" role="alert">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
