{% extends 'core/base.html' %}
{% block title %}Add Staff - PharmSync{% endblock %}
{% block page_title %}New System User{% endblock %}
{% block breadcrumb %}Create access credentials for a new employee{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="custom-card">
            <h6 class="fw-bold mb-4">Account Details</h6>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">USERNAME</label>
                    <input type="text" class="form-control bg-light border-0 py-3 rounded-4" name="username" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small fw-bold">EMAIL (OPTIONAL)</label>
                    <input type="email" class="form-control bg-light border-0 py-3 rounded-4" name="email">
                </div>
                <div class="mb-5">
                    <label class="form-label text-muted small fw-bold">TEMPORARY PASSWORD</label>
                    <input type="password" class="form-control bg-light border-0 py-3 rounded-4" name="password" required>
                </div>
                <div class="d-flex gap-3">
                    <a href="{% url 'manage_staff' %}" class="btn bg-light w-50 py-3 rounded-pill fw-bold text-muted">Cancel</a>
                    <button type="submit" class="btn w-50 py-3 rounded-pill fw-bold text-white shadow-sm" style="background-color: var(--active-pill);">Create Account</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
